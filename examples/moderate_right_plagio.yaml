# Moderate right-side plagiocephaly: right-posterior occipital flattening
# with a single correction zone applied on the contralateral (left-frontal)
# region to encourage symmetric growth.
name: moderate_right_plagio

head:
  length_mm: 165.0
  width_mm: 130.0
  height_mm: 115.0
  subdivisions: 5
  # Moderate right-side occipital flattening: deeper indent (15 mm) and a
  # broader region (55 mm), shifted laterally to +X. The deeper indent
  # produces a visibly asymmetric head so the resulting corrective helmet
  # is clinically distinguishable from the baseline.
  occipital_flat_mm: 15.0
  occipital_flat_radius_mm: 55.0
  occipital_flat_lateral_offset_mm: 35.0  # +X = right
  frontal_bossing_mm: 0.0
  brachycephaly_factor: 1.0

shell:
  relief_mm: 3.0
  wall_thickness_mm: 4.5      # slightly thicker to leave headroom for correction
  # Two correction zones: a primary left-frontal correction (the typical
  # contralateral prominence of right-posterior plagiocephaly), and a
  # smaller right-posterior pressure point to discourage further flattening.
  # Magnitudes bounded so wall_thickness - magnitude >= min_wall_thickness_mm (3.0).
  # z_mm values are in the canonical skull-base-at-origin frame: the head
  # spans z = 0 to z = height_mm (115). z ≈ 80–95 mm is the upper cranium
  # where the typical contralateral prominence and the residual flattening
  # sit on an 8-month-old infant.
  correction_regions:
    - x_mm: -45.0
      y_mm:  55.0
      z_mm:  87.5
      radius_mm: 40.0
      magnitude_mm: 1.4
      falloff: gaussian
    - x_mm:  35.0
      y_mm: -60.0
      z_mm:  82.5
      radius_mm: 35.0
      magnitude_mm: 1.0
      falloff: gaussian

trim:
  cut_depth_mm: 80.0
  control_points:
    - { azimuth_deg:   0.0, elevation_deg: -15.0 }
    - { azimuth_deg:  45.0, elevation_deg: -12.0 }
    - { azimuth_deg:  90.0, elevation_deg:   0.0 }
    - { azimuth_deg: 135.0, elevation_deg: -12.0 }
    - { azimuth_deg: 180.0, elevation_deg: -18.0 }
    - { azimuth_deg: 225.0, elevation_deg: -12.0 }
    - { azimuth_deg: 270.0, elevation_deg:   0.0 }
    - { azimuth_deg: 315.0, elevation_deg: -12.0 }

validation:
  min_wall_thickness_mm: 3.0
  max_mass_g: 250.0
  max_bbox_extent_mm: 250.0
  material_density_g_per_cm3: 1.27
