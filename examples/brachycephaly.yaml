# Brachycephaly: AP-compressed (front-to-back short) head with broad
# occipital flattening and frontal bossing. Two correction zones encourage
# AP elongation by gently pressing on the broad front and broad back.
name: brachycephaly

head:
  length_mm: 165.0
  width_mm: 130.0
  height_mm: 115.0
  subdivisions: 5
  # Symmetric (no lateral offset) but compressed front-to-back.
  occipital_flat_mm: 6.0
  occipital_flat_radius_mm: 55.0
  occipital_flat_lateral_offset_mm: 0.0
  frontal_bossing_mm: 5.0
  frontal_bossing_radius_mm: 40.0
  brachycephaly_factor: 0.85   # 15% AP compression

shell:
  relief_mm: 3.0
  wall_thickness_mm: 4.0
  correction_regions:
    # Anterior correction — press on the prominent forehead.
    # Magnitude bounded so wall_thickness - magnitude >= 3.0 mm.
    - x_mm:  0.0
      y_mm:  60.0
      z_mm:  30.0
      radius_mm: 40.0
      magnitude_mm: 0.8
      falloff: gaussian
    # Posterior correction — press on the broad back.
    - x_mm:  0.0
      y_mm: -55.0
      z_mm:  30.0
      radius_mm: 45.0
      magnitude_mm: 0.8
      falloff: gaussian

trim:
  cut_depth_mm: 80.0
  control_points:
    - { azimuth_deg:   0.0, elevation_deg: -15.0 }
    - { azimuth_deg:  45.0, elevation_deg: -12.0 }
    - { azimuth_deg:  90.0, elevation_deg:   0.0 }
    - { azimuth_deg: 135.0, elevation_deg: -12.0 }
    - { azimuth_deg: 180.0, elevation_deg: -18.0 }
    - { azimuth_deg: 225.0, elevation_deg: -12.0 }
    - { azimuth_deg: 270.0, elevation_deg:   0.0 }
    - { azimuth_deg: 315.0, elevation_deg: -12.0 }

validation:
  min_wall_thickness_mm: 3.0
  max_mass_g: 250.0
  max_bbox_extent_mm: 250.0
  material_density_g_per_cm3: 1.27
