# Pre-commit hooks. Install with `uv run pre-commit install`.
#
# The "no-llm-imports-in-kernel" hook enforces invariant #1 in CLAUDE.md:
# the kernel produces geometry, the LLM produces parameters. It scans both
# kernel/ and anatomy/ for forbidden imports — LLM SDKs, and (dependency-
# direction rule) the higher layers datamodel/ and storage/. The lower
# layers must never import the higher ones.

repos:
  - repo: local
    hooks:
      - id: no-llm-imports-in-kernel
        name: no LLM SDK imports under kernel/ or anatomy/
        entry: uv run python scripts/check_no_llm_imports.py
        language: system
        types: [python]
        files: ^(kernel|anatomy)/
        pass_filenames: false

      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
