# Pre-commit hooks. Install with `uv run pre-commit install`.
#
# The no-forbidden-imports hook enforces invariant #1 (no LLM SDK in any
# first-party package) and the dependency-direction rule (CLAUDE.md package
# boundaries). It scans kernel/, anatomy/, datamodel/, storage/, synthesis/
# with a per-layer forbidden set: arrows point one way only —
# synthesis -> {datamodel, kernel, anatomy}, storage -> datamodel,
# datamodel -> {anatomy, kernel}, anatomy -> kernel; nothing imports
# synthesis; no layer imports an LLM SDK.

repos:
  - repo: local
    hooks:
      - id: no-llm-imports-in-kernel
        name: no LLM SDK / dependency-direction violations
        entry: uv run python scripts/check_no_llm_imports.py
        language: system
        types: [python]
        files: ^(kernel|anatomy|datamodel|storage|synthesis)/
        pass_filenames: false

      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
